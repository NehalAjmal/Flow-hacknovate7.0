name: frontend
description: The premium desktop client for FLOW.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI Icons
  cupertino_icons: ^1.0.6

  # Native Desktop Window Management
  window_manager: ^0.4.0 
  
  # Network requests to FastAPI Backend
  http: ^1.2.0
  provider: ^6.1.5+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

